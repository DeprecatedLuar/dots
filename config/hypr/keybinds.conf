$mainMod = SUPER # Sets "Windows" key as main modifier

#──[Launchers]-------------------------------------------------------------

bind = $mainMod, Return, exec, $TERMINAL
bind = $mainMod, F, exec, $FILEMANAGER
bind = $mainMod, B, exec, $BROWSER

#──[Window Management]-----------------------------------------------------

# Window controls
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, M, fullscreen, toggle
bind = , F11, fullscreenstate, 0 2
bind = $mainMod, Z, togglefloating,
#bind = $mainMod, P, pseudo, # dwindle

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows (left/right disabled - conflicts with hyprscrolling swapcol)
#bind = $mainMod, O, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod, I, movewindow, l
bind = $mainMod ALT, right, exec, ~/.config/hypr/scripts/move-to-monitor.sh next
bind = $mainMod ALT, left, exec, ~/.config/hypr/scripts/move-to-monitor.sh prev

# Resize windows (disabled - using hyprscrolling colresize instead)
#bind = $mainMod CTRL, left, resizeactive, -100 0
bind = $mainMod CTRL, up, resizeactive, 0 70
bind = $mainMod CTRL, down, resizeactive, 0 -70
#bind = $mainMod CTRL, right, resizeactive, 100 0

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#──[Workspaces]------------------------------------------------------------

# Switch workspaces (per-monitor via hyprsplit)
bind = $mainMod, 1, split:workspace, 1
bind = $mainMod, 2, split:workspace, 2
bind = $mainMod, 3, split:workspace, 3
bind = $mainMod, 4, split:workspace, 4
bind = $mainMod, 5, split:workspace, 5
bind = $mainMod, 6, split:workspace, 6
bind = $mainMod, 7, split:workspace, 7
bind = $mainMod, 8, split:workspace, 8
bind = $mainMod, 9, split:workspace, 9
bind = $mainMod, 0, split:workspace, 10

# Move windows to workspaces (per-monitor via hyprsplit)
bind = $mainMod SHIFT, 1, split:movetoworkspace, 1
bind = $mainMod SHIFT, 2, split:movetoworkspace, 2
bind = $mainMod SHIFT, 3, split:movetoworkspace, 3
bind = $mainMod SHIFT, 4, split:movetoworkspace, 4
bind = $mainMod SHIFT, 5, split:movetoworkspace, 5
bind = $mainMod SHIFT, 6, split:movetoworkspace, 6
bind = $mainMod SHIFT, 7, split:movetoworkspace, 7
bind = $mainMod SHIFT, 8, split:movetoworkspace, 8
bind = $mainMod SHIFT, 9, split:movetoworkspace, 9
bind = $mainMod SHIFT, 0, split:movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Special workspace (scratchpad)
bind = $mainMod, space, togglespecialworkspace, magic
bind = $mainMod SHIFT, space, movetoworkspace, special:magic

