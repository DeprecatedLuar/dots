#──[Display Configuration]─────────────────────────────────────────────────
# See https://wiki.hyprland.org/Configuring/Monitors/

# Temporary: TV as main display, mirrored to laptop
monitor=HDMI-A-1,3840x2160@30,0x0,1.5
monitor=eDP-1,preferred,auto,1,mirror,HDMI-A-1
monitor=DP-1,1920x1080@60,3840x0,1.0, transform, 0

# Original config (uncomment to restore):
# monitor=eDP-1,1920x1080@60,0x0,1.0
# monitor=DP-1,1920x1080@60,1920x0,1.0, transform, 0
# monitor=HDMI-A-1,preferred,auto,1,mirror,eDP-1


#──[Cursor Size]───────────────────────────────────────────────────────────
# DPI-dependent cursor sizes

env = XCURSOR_SIZE,17
env = HYPRCURSOR_SIZE,17

cursor {
    no_hardware_cursors = true
}


#──[Input Devices]─────────────────────────────────────────────────────────
# https://wiki.hyprland.org/Configuring/Variables/#input

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Wacom Tablet - Map to main monitor only
device {
    name = wacom-one-by-wacom-s-pen
    output = eDP-1
}

device {
    name = tablet-monitor-pen
    output = DP-1 
}
