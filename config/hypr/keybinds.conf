#──[Caelestia Shell]-------------------------------------------------------

# Caelestia global shortcuts
bind = $mainMod, Space, global, caelestia:launcher
bind = $mainMod, D, global, caelestia:dashboard
bind = $mainMod SHIFT, Escape, global, caelestia:session
